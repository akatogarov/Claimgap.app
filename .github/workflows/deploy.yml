name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # One command: next build + next-on-pages (must match Cloudflare Pages dashboard if using Git builds there).
      - name: Build Cloudflare Pages bundle
        run: npm run deploy
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=8192
          # Production site; override in repo secrets if needed.
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL || 'https://claimgap.app' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static/ --project-name=claimgap --commit-dirty=true
