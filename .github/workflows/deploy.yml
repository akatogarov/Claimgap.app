name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # One command: next build + next-on-pages
      - name: Build Cloudflare Pages bundle
        run: npm run deploy
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL || 'https://claimgap.app' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️  CLOUDFLARE_API_TOKEN secret is not set — skipping deploy."
            echo ""
            echo "To enable auto-deploy, add these secrets at:"
            echo "  https://github.com/akatogarov/Claimgap.app/settings/secrets/actions"
            echo ""
            echo "  CLOUDFLARE_API_TOKEN  — create at https://dash.cloudflare.com/profile/api-tokens"
            echo "                          Permission: Cloudflare Pages - Edit"
            echo "  CLOUDFLARE_ACCOUNT_ID — 062bff0ad5bbfa43d7de2e8a2eaf1d95"
            exit 0
          fi
          npx wrangler pages deploy .vercel/output/static/ --project-name=claimgap --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '062bff0ad5bbfa43d7de2e8a2eaf1d95' }}
