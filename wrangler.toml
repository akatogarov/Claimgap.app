# Cloudflare Pages + Next.js (@cloudflare/next-on-pages)
# https://github.com/cloudflare/next-on-pages
#
# Build: npm run deploy  →  output: .vercel/output/static
# Deploy (CLI): npm run cf:deploy
#
# Cloudflare Pages (Git) dashboard:
# - Build command: npm run deploy   (same as GitHub Actions)
# - Output directory: .vercel/output/static
# - Env: NODE_VERSION=20, NEXT_PUBLIC_URL=https://claimgap.app, plus API keys (see CLOUDFLARE_SETUP.md)

name = "claimgap"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# @cloudflare/next-on-pages output directory
pages_build_output_dir = "./.vercel/output/static"
